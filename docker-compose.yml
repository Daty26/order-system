services:
  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: "KM2194jmaTFywaAc-HB0TMg"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres-notifications:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notifications
    volumes:
      - ./notification-service/migrations:/docker-entrypoint-initdb.d
      - pgdata_notifications:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./notification-service
    env_file:
      - ./notification-service/.env
    ports:
      - "8082:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-notifications:
        condition: service_healthy

  postgres-payment:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: payments
    volumes:
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
      - pgdata_payments:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./payment-service
    env_file:
      - ./payment-service/.env
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy

  postgres-order:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orders
    volumes:
      - ./order-service/migrations:/docker-entrypoint-initdb.d
      - pgdata_orders:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    env_file:
      - ./order-service/.env
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-order:
        condition: service_healthy

  postgres-inventory:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inventory
    volumes:
      - ./inventory-service/migrations:/docker-entrypoint-initdb.d
      - pgdata_inventory:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-service:
    build: ./inventory-service
    env_file:
      - ./inventory-service/.env
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-inventory:
        condition: service_healthy

  postgres-user:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: users
    volumes:
      - ./user-service/migrations:/docker-entrypoint-initdb.d
      - pgdata_users:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    env_file:
      - ./user-service/.env
    ports:
      - "8085:8085"
    depends_on:
      postgres-user:
        condition: service_healthy



volumes:
  pgdata_notifications:
  pgdata_payments:
  pgdata_orders:
  pgdata_users:
  pgdata_inventory: